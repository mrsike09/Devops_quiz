{% extends "base.html" %}

{% block title %}Login - TriviaGlow{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card glass">
        <h2>Welcome Back</h2>
        <p>Login to start testing your trivia skills and track your progress.</p>
        
        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Enter your username" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                <i data-lucide="log-in"></i> Log In
            </button>
        </form>
        
        <div class="auth-footer">
            Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
        </div>
    </div>
</div>
{% endblock %}
